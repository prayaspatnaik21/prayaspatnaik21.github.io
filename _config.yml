title: Prayas Patnaik
description: Perception Engineer | Camera ISP | Image Quality Optimization
author: Prayas Patnaik
email: prayaspatnaik21@gmail.com
url: https://prayaspatnaik21.github.io
baseurl: ""

# Jekyll settings
markdown: kramdown
permalink: /blog/:title/
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude files
exclude:
  - vendor
  - vendor/bundle
  - blog/template.html
  - Gemfile
  - Gemfile.lock
  - node_modules
  - .gitignore
  - README.md

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      category: "blog"
